<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEVEL 1</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="terminal"></div>
  <input id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

  <script src="terminal.js"></script>
  <script>
    let step = 0;

    const dataSets = [
      `[
  {
    "vq": 1,
    "vzvr": "Wna",
    "jvrx": 21,
    "zvnfgb": "Xvrypr"
  },
  {
    "vq": 2,
    "vzvr": "Naan",
    "jvrx": 19,
    "zvnfgb": "Xenxbj"
  }
]`,
      `| vq | vzvr  | jvrx | zvnfgb |
|----|-------|------|--------|
| 1  | Wna   | 21   | Xvrypr |
| 2  | Naan  | 19   | Xenxbj |`,
      `0x
6d6265746e61766d626a6e616c2c20727972786765626176
706d616c206d6f76c3b3652063626a76c4856d6e616c7075
206d722066626fc4852076617362657a6e7077762028716e
616c7075292c2063656d727075626a6c6a6e616c206a2066
6c6667727a76722078627a6368677265626a6c7a`
    ];

    const questions = [
      "> ANALYZING DATA FORMAT...",
      "> ANALYZING DATA REPRESENTATION...",
      "> DEFINING CONCEPT..."
    ];

    const encodedAnswers = [
      ["anNvbg=="],
      ["dGFibGU=", "dGFiZWxh", "dGFibGljYQ=="],
      [
        "YmF6YSBkYW55Y2g=",
        "ZGF0YWJhc2U="
      ]
    ];

    const successMessages = [
      "> DATA FORMAT RECOGNIZED",
      "> DATA REPRESENTATION RECOGNIZED",
      "> CONCEPT RECOGNIZED"
    ];

    function loadStep() {
      const dataLines = dataSets[step]
        .split("\n")
        .map(line => line.replace(/^\s+/g, spaces => "\u00A0".repeat(spaces.length)));

      typeLines([
        questions[step],
        "",
        ...dataLines.map(line => line.replace(/ /g, "\u00A0")),
        ""
      ], () => {
        enableInput(handleInput);
      });
    }

    function handleInput(value) {
      const encoded = btoa(value.toLowerCase().trim());

      if (encodedAnswers[step].includes(encoded)) {

        triggerSuccess();

        typeLines([
          successMessages[step],
          ""
        ], () => {
          step++;

          if (step < dataSets.length) {
            loadStep();
          } else {
              typeLines([
                "> ACCESS GRANTED",
                "",
                "Baza danych to uporządkowany system przechowywania informacji.",
                "Każdy rekord ma swoje miejsce, a każda kolumna opisuje konkretną cechę.",
                "",
                "Dzięki temu dane można odnaleźć, porównać i połączyć",
                "z innymi informacjami bez tracenia ich znaczenia.",
                "",
                "→ LEVEL 2"
              ], () => {

              goToLevel("level-2.html");
            });
          }
        });

      } else {
        triggerErrorGlitch();

        typeLines(["> ACCESS DENIED"], () => {
          enableInput(handleInput);
        });
      }
    }

    showBootScreen(() => {
      typeLines([
        "> INITIALIZING NODE...",
        "> LEVEL: 1",
        ""
      ], loadStep);
    });
  </script>

</body>

</html>
