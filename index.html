<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEVEL 0</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="terminal"></div>

<input id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

<script src="terminal.js"></script>
<script>
  // LEVEL 0 logic using terminal engine

  showBootScreen(() => {

    typeLines([
      "> BOOTING SYSTEM...",
      "> LOADING MODULES...",
      "> CONNECTING...",
      "> ACCESS NODE FOUND",
      "> INITIALIZING NODE",
      "> LEVEL: 0",
      "",
      "> AUTHENTICATION REQUIRED",
      "",
      "01000100 01000001 01001110 01000101",
      ""
    ], () => {

      const handleInput = (value) => {
      const encoded = btoa(value.toLowerCase().trim());

      if (encoded === "ZGFuZQ==" || encoded === "ZGF0YQ==") {

        triggerSuccess();

        typeLines([
          "> ACCESS GRANTED",
          "",
          "Dane stały się najcenniejszym zasobem XXI wieku.",
          "Każdej sekundy powstają ich ogromne ilości — w mediach społecznościowych, finansach i technologii.",
          "Każdego dnia ludzkość generuje ponad 400 milionów terabajtów danych.",
          "",
          "→ LEVEL 1"
        ], () => {

          goToLevel("level-1.html");

        });

      } else {

        triggerErrorGlitch();

        typeLines(["> ACCESS DENIED"], () => {
          enableInput(handleInput);
          document.getElementById("hiddenInput").focus();
        });

      }
    };

      enableInput(handleInput);

    });

  });
</script>

</body>
</html>
