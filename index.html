<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>LEVEL 0</title>

<style>
body {
  background: black;
  color: #00ffcc;
  font-family: monospace;
  text-align: center;
  padding-top: 10%;
}

input {
  background: black;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  padding: 10px;
  margin-top: 20px;
}

button {
  background: #00ffcc;
  color: black;
  border: none;
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>> INITIALIZING NODE</h2>
<h3>> LEVEL: 0</h3>

<p>> AUTHENTICATION REQUIRED</p>

<p><b>01010001 01001110 01000001 01010010</b></p>

<input type="text" id="answer" placeholder="ENTER PASSWORD">
<br>
<button onclick="check()">ENTER</button>

<p id="result"></p>

<script>
function check() {
  const input = document.getElementById("answer").value.toLowerCase().trim();

  if (input === "dane" || input === "data") {
    document.getElementById("result").innerHTML =
      "> ACCESS GRANTED<br><br>Dane stały się najcenniejszym zasobem XXI wieku.<br>Każdej sekundy powstają ich ogromne ilości — w mediach społecznościowych, finansach i technologii.<br>Każdego dnia ludzkość generuje ponad 400 milionów terabajtów danych.<br><br>→ LEVEL 1";

    setTimeout(() => {
      window.location.href = "level-1.html";
    }, 4000);

  } else {
    document.getElementById("result").innerHTML = "> ACCESS DENIED";
  }
}
</script>

</body>
</html>
