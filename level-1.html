const questions = [

  "> ANALYZING DATA REPRESENTATION...",
  "> DEFINING CONCEPT..."
];

const answers = [
  ["json"],
  ["table", "tabela"],
  ["struktura", "struktura danych"]
];

function loadData() {
  document.getElementById("dataBox").innerText = dataSets[step];
  document.getElementById("question").innerText = questions[step];
}

function check() {
  const input = document.getElementById("answer").value.toLowerCase().trim();

  if (answers[step].includes(input)) {

    step++;

    if (step < dataSets.length) {
      document.getElementById("result").innerHTML = "> OK";
      document.getElementById("answer").value = "";
      loadData();
    } else {
      document.getElementById("result").innerHTML =
        "> ACCESS GRANTED<br><br>Struktura porządkuje dane i nadaje im znaczenie. <br><br>→ LEVEL 2";

      setTimeout(() => {
        window.location.href = "level-2.html";
      }, 2500);
    }

  } else {
    document.getElementById("result").innerHTML = "> ACCESS DENIED";
  }
}

loadData();
