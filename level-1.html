<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>LEVEL 1</title>

<style>
body {
  background: black;
  color: #00ffcc;
  font-family: monospace;
  text-align: center;
  padding-top: 8%;
  text-shadow: 0 0 5px #00ffcc;
  overflow: hidden;
}

/* scanlines */
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,255,204,0.05),
    rgba(0,255,204,0.05) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
}

/* cursor */
.cursor::after {
  content: "_";
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}

.data-box {
  border: 1px solid #00ffcc;
  display: inline-block;
  padding: 20px;
  margin-top: 20px;
  text-align: left;
  max-width: 700px;
  white-space: pre-wrap;
}

input {
  background: black;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  padding: 10px;
  margin-top: 20px;
}

button {
  background: #00ffcc;
  color: black;
  border: none;
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}

/* glitch */
.glitch {
  animation: glitch 0.3s;
  text-shadow: 2px 0 red, -2px 0 blue;
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-5px, 5px); }
  40% { transform: translate(5px, -5px); }
  60% { transform: translate(-3px, 3px); }
  80% { transform: translate(3px, -3px); }
  100% { transform: translate(0); }
}

/* shake */
.shake {
  animation: shake 0.3s;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}
</style>
</head>

<body>

<h2 class="cursor">> INITIALIZING NODE</h2>
<h3>> LEVEL: 1</h3>

<p id="status">> ANALYZING DATA FORMAT...</p>

<div class="data-box" id="dataBox"></div>

<p id="question"></p>

<input type="text" id="answer" placeholder="ENTER ANSWER">
<br>
<button onclick="check()">ENTER</button>

<p id="result"></p>

<script>

let step = 0;

const dataSets = [/* TWOJE DANE — zostają bez zmian */];

const questions = [
  "> ANALYZING DATA FORMAT...",
  "> ANALYZING DATA REPRESENTATION...",
  "> DEFINING CONCEPT..."
];

// 🔒 zakodowane hasła
const encodedAnswers = [
  ["anNvbg=="],                         // json
  ["dGFibGU=", "dGFiZWxh"],             // table / tabela
  ["c3RydWt0dXJh", "c3RydWt0dXJhIGRhbnljaA=="] // struktura
];

function loadData() {
  document.getElementById("dataBox").innerText = dataSets[step];
  document.getElementById("question").innerText = questions[step];
}

function check() {
  const input = document.getElementById("answer").value.toLowerCase().trim();
  const encoded = btoa(input);
  const result = document.getElementById("result");

  if (encodedAnswers[step].includes(encoded)) {

    step++;

    if (step < dataSets.length) {
      result.innerHTML = "> OK";
      document.getElementById("answer").value = "";
      loadData();
    } else {

      result.innerHTML =
        "> ACCESS GRANTED<br><br>Struktura porządkuje dane i nadaje im znaczenie.<br><br>→ LEVEL 2";

      // glitch
      setTimeout(() => {
        document.body.classList.add("glitch");
      }, 1500);

      setTimeout(() => {
        window.location.href = "level-2.html";
      }, 2000);
    }

  } else {
    result.innerHTML = "> ACCESS DENIED";
    document.getElementById("answer").classList.add("shake");

    setTimeout(() => {
      document.getElementById("answer").classList.remove("shake");
    }, 300);
  }
}

loadData();

</script>

</body>
</html>
