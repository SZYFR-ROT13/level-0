<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>LEVEL 0</title>

<style>
body {
  background: black;
  color: #00ffcc;
  font-family: monospace;
  padding: 40px;
  text-shadow: 0 0 5px #00ffcc;
}

/* cursor */
.cursor::after {
  content: "_";
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}
</style>
</head>

<body>

<div id="terminal"></div>

<script>

const terminal = document.getElementById("terminal");

let input = "";
let inputActive = false;

// typing lines
const lines = [
  "> BOOTING SYSTEM...",
  "> LOADING MODULES...",
  "> CONNECTING...",
  "> ACCESS NODE FOUND",
  "> INITIALIZING NODE",
  "> LEVEL: 0",
  "",
  "> AUTHENTICATION REQUIRED",
  "",
  "01000100 01000001 01001110 01000101",
  ""
];

let lineIndex = 0;
let charIndex = 0;

function typeLine() {
  if (lineIndex < lines.length) {

    if (charIndex < lines[lineIndex].length) {
      terminal.innerHTML += lines[lineIndex][charIndex];
      charIndex++;
      setTimeout(typeLine, 15);
    } else {
      terminal.innerHTML += "<br>";
      lineIndex++;
      charIndex = 0;
      setTimeout(typeLine, 200);
    }

  } else {
    enableInput();
  }
}

typeLine();

// ENABLE TERMINAL INPUT
function enableInput() {
  inputActive = true;
  terminal.innerHTML += "> ";
  updateInput();
}

// UPDATE INPUT LINE
function updateInput() {
  const lastLine = terminal.innerHTML.split("<br>");
  lastLine[lastLine.length - 1] = "> " + input + '<span class="cursor"></span>';
  terminal.innerHTML = lastLine.join("<br>");
}

// KEYBOARD INPUT
document.addEventListener("keydown", (e) => {
  if (!inputActive) return;

  if (e.key === "Enter") {
    processInput();
  } else if (e.key === "Backspace") {
    input = input.slice(0, -1);
  } else if (e.key.length === 1) {
    input += e.key;
  }

  updateInput();
});

// PROCESS INPUT
function processInput() {
  inputActive = false;

  terminal.innerHTML += "<br>";

  const value = input.toLowerCase().trim();

  if (btoa(value) === "ZGFuZQ==" || btoa(value) === "ZGF0YQ==") {

    typeMessage([
      "> ACCESS GRANTED",
      "",
      "Dane stały się najcenniejszym zasobem XXI wieku.",
      "Każdej sekundy powstają ich ogromne ilości — w mediach społecznościowych, finansach i technologii.",
      "Każdego dnia ludzkość generuje ponad 400 milionów terabajtów danych.",
      "",
      "→ LEVEL 1"
    ], () => {
      setTimeout(() => {
        window.location.href = "level-1.html";
      }, 1500);
    });

  } else {
    typeMessage(["> ACCESS DENIED"], () => {
      input = "";
      enableInput();
    });
  }
}

// TYPE MESSAGE
function typeMessage(lines, callback) {
  let i = 0;
  let j = 0;

  function type() {
    if (i < lines.length) {
      if (j < lines[i].length) {
        terminal.innerHTML += lines[i][j];
        j++;
        setTimeout(type, 15);
      } else {
        terminal.innerHTML += "<br>";
        i++;
        j = 0;
        setTimeout(type, 200);
      }
    } else if (callback) {
      callback();
    }
  }

  type();
}

</script>

</body>
</html>
