<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>LEVEL 0</title>

<style>
body {
  background: black;
  color: #00ffcc;
  font-family: monospace;
  text-align: left;
  padding: 40px;
  text-shadow: 0 0 5px #00ffcc;
}

/* cursor */
.cursor::after {
  content: "_";
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}

input, button {
  display: none;
  background: black;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  padding: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div id="terminal" class="cursor"></div>

<input type="text" id="answer" placeholder="ENTER PASSWORD">
<br>
<button onclick="check()">ENTER</button>

<script>

const lines = [
  "> BOOTING SYSTEM...",
  "> LOADING MODULES...",
  "> CONNECTING...",
  "> ACCESS NODE FOUND",
  "> INITIALIZING NODE",
  "> LEVEL: 0",
  "",
  "> AUTHENTICATION REQUIRED",
  "",
  "01000100 01000001 01001110 01000101",
  ""
];

const terminal = document.getElementById("terminal");

let lineIndex = 0;
let charIndex = 0;

function typeLine() {
  if (lineIndex < lines.length) {

    if (charIndex < lines[lineIndex].length) {
      terminal.innerHTML += lines[lineIndex][charIndex];
      charIndex++;
      setTimeout(typeLine, 15);
    } else {
      terminal.innerHTML += "<br>";
      lineIndex++;
      charIndex = 0;
      setTimeout(typeLine, 200);
    }

  } else {
    // pokaż input po zakończeniu
    document.getElementById("answer").style.display = "inline-block";
    document.querySelector("button").style.display = "inline-block";
  }
}

typeLine();

// CHECK
function check() {
  const input = document.getElementById("answer").value.toLowerCase().trim();

  if (btoa(input) === "ZGFuZQ==" || btoa(input) === "ZGF0YQ==") {

    const message = [
      "",
      "> ACCESS GRANTED",
      "",
      "Dane stały się najcenniejszym zasobem XXI wieku.",
      "Każdej sekundy powstają ich ogromne ilości — w mediach społecznościowych, finansach i technologii.",
      "Każdego dnia ludzkość generuje ponad 400 milionów terabajtów danych.",
      "",
      "→ LEVEL 1"
    ];

    lineIndex = 0;
    charIndex = 0;

    function typeMessage() {
      if (lineIndex < message.length) {

        if (charIndex < message[lineIndex].length) {
          terminal.innerHTML += message[lineIndex][charIndex];
          charIndex++;
          setTimeout(typeMessage, 15);
        } else {
          terminal.innerHTML += "<br>";
          lineIndex++;
          charIndex = 0;
          setTimeout(typeMessage, 200);
        }

      } else {
        setTimeout(() => {
          window.location.href = "level-1.html";
        }, 2000);
      }
    }

    typeMessage();

  } else {
    terminal.innerHTML += "<br>> ACCESS DENIED<br>";
  }
}

</script>

</body>
</html>
