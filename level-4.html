  timeoutId: null

let deanOfficeTalkWaiting = false;

const deanOfficeHours = {

    days: {
      1: ["09:30", "13:00"],
      2: ["09:30", "13:00"],
      4: ["09:30", "13:00"],

  },
  WEAiI: {
    days: {

  WBiA: {

  WMiBM: {

function getCurrentDir() {
  let dir = fileSystem;
  for (let p of currentPath) {
    dir = dir[p];
  }
  return dir;
}

function printPath() {
  return currentPath.join("/");
}

function showPrompt() {
  enableInput(handleInput, printPath() + "> ");
}

function timeToMinutes(value) {
  const [hours, minutes] = value.split(":").map(Number);
  return hours * 60 + minutes;
}

function formatDeanOfficeHours(schedule) {
  const weekdays = [
    ["poniedziałek", 1],
    ["wtorek", 2],
    ["środa", 3],
    ["czwartek", 4],
    ["piątek", 5]
  ];

  return weekdays.map(([label, day]) => {
    const hours = schedule.days[day];
    return hours ? `${label}: ${hours[0]}-${hours[1]}` : `${label}: zamknięte`;
  });
}

function getDeanOfficeStatus(department, now = new Date()) {
  const schedule = deanOfficeHours[department];

  if (!schedule) {
    return { hasHours: false, open: true, lines: [] };
  }

  const todayHours = schedule.days[now.getDay()];
  const currentMinutes = now.getHours() * 60 + now.getMinutes();
  const isOpen = Boolean(todayHours)
    && currentMinutes >= timeToMinutes(todayHours[0])
    && currentMinutes <= timeToMinutes(todayHours[1]);

  return {
    hasHours: true,
    open: isOpen,
    lines: [
      "dziekanat zamknięty",
      "",
      "godziny otwarcia:",
      ...formatDeanOfficeHours(schedule)
    ]
  };
}

function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function formatQueuePosition(count) {
  if (count === 1) return "Została 1 osoba przed Tobą.";
  if (count >= 2 && count <= 4) return `Zostały ${count} osoby przed Tobą.`;
  return `Zostało ${count} osób przed Tobą.`;
}

function startDeanOfficeQueue() {
  let queueCount = randomInt(8, 23);
  deanOfficeQueue.active = true;

  typeLines([
    `Jesteś ${queueCount} w kolejce`,
    "Oczekiwanie..."
  ], () => {
    function nextPerson() {
      const delay = randomInt(20, 200) * 1000;

      deanOfficeQueue.timeoutId = setTimeout(() => {
        if (!deanOfficeQueue.active) return;

        queueCount--;

        if (queueCount > 0) {
          typeLines([
            formatQueuePosition(queueCount),
            "Oczekiwanie..."
          ], nextPerson);
        } else {
          deanOfficeQueue.active = false;
          deanOfficeQueue.timeoutId = null;
          typeLines(["Twoja kolej."], () => {
            showPrompt();
          });
        }
      }, delay);
    }

    nextPerson();
  });
}

function leaveDeanOfficeQueue() {
  deanOfficeQueue.active = false;

  if (deanOfficeQueue.timeoutId) {
    clearTimeout(deanOfficeQueue.timeoutId);
    deanOfficeQueue.timeoutId = null;
  }

  if (currentPath[currentPath.length - 1] === "dziekanat") {
    currentPath.pop();
  }

  typeLines(["wyszedłeś z kolejki"], () => {
    showPrompt();
  });
}

function leaveDeanOffice() {
  deanOfficeTalkWaiting = false;

  if (currentPath[currentPath.length - 1] === "dziekanat") {
    currentPath.pop();
  }

  typeLines(["wyszedłeś z dziekanatu"], () => {
    showPrompt();
  });
}

function startDeanOfficeTalk(person) {
  if (!person.waitsForever) {
    typeLines([person.line], () => {
      showPrompt();
    });
    return;
  }

  deanOfficeTalkWaiting = true;

  typeLines([
    person.line,
    "Oczekiwanie..."
  ], () => {
    enableInput(handleInput, printPath() + "> ");
  });
}

function isFolder(item) {
  return item && typeof item === "object" && item.type !== "person";
}

function isFile(item) {
  return typeof item === "string";
}

function isPerson(item) {
  return item && typeof item === "object" && item.type === "person";
}

function findFolderKey(dir, target) {
  return Object.keys(dir).find(folder => folder.toLowerCase() === target.toLowerCase() && isFolder(dir[folder]));
}

function findFileKey(dir, target) {
  return Object.keys(dir).find(file => file.toLowerCase() === target.toLowerCase() && isFile(dir[file]));
}

function findPersonKey(dir, target) {
  return Object.keys(dir).find(person => person.toLowerCase() === target.toLowerCase() && isPerson(dir[person]));
}

function showInzynieriaDanychVideo() {
  playPyramidAnimation(() => {
    terminal.innerHTML = "";

    const video = document.createElement("div");
    video.className = "video-wrapper";

    video.innerHTML = `
      <iframe class="video-frame" src="https://www.youtube.com/embed/EJnh5cLVCtE"
      title="Inżynieria danych" frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen></iframe>
    `;

    terminal.appendChild(video);
  });
}

function getAutocompleteOptions(value) {
  const commands = ["ls", "cd ", "cat ", "talk ", "pwd", "help"];
  const lowerValue = value.toLowerCase();

  if (!value.includes(" ")) {
    return commands.filter(command => command.toLowerCase().startsWith(lowerValue));
  }

  if (lowerValue.startsWith("cd ")) {
    const fragment = value.slice(3).toLowerCase();
    const dir = getCurrentDir();
    const folders = ["..", ...Object.keys(dir).filter(item => isFolder(dir[item]))];

    return folders
      .map(folder => `cd ${folder}`)
      .filter(command => command.toLowerCase().startsWith(`cd ${fragment}`));
  }

  if (lowerValue.startsWith("cat ")) {
    const fragment = value.slice(4).toLowerCase();
    const dir = getCurrentDir();
    const files = Object.keys(dir).filter(item => isFile(dir[item]));

    return files
      .map(file => `cat ${file}`)
      .filter(command => command.toLowerCase().startsWith(`cat ${fragment}`));
  }

  if (lowerValue.startsWith("talk ")) {
    const fragment = value.slice(5).toLowerCase();
    const dir = getCurrentDir();
    const people = Object.keys(dir).filter(item => isPerson(dir[item]));

    return people
      .map(person => `talk ${person}`)
      .filter(command => command.toLowerCase().startsWith(`talk ${fragment}`));
  }

  return [];
}

function handleInput(input) {
  if (deanOfficeQueue.active) {
    leaveDeanOfficeQueue();
    return;
  }

  if (deanOfficeTalkWaiting) {
    leaveDeanOffice();
    return;
  }

  const args = input.trim().split(" ");
  const target = args.slice(1).join("_");
  const command = args[0].toLowerCase();

  const dir = getCurrentDir();

  if (command === "ls") {
    const items = Object.keys(dir);
    typeLines(items, () => {
      showPrompt();
    });
  }

  else if (command === "cd") {
    if (!target) {
      typeLines(["usage: cd <folder>"], () => {
        showPrompt();
      });
      return;
    }

    if (target === "..") {
      if (currentPath.length > 1) currentPath.pop();
      showPrompt();
      return;
    }

    const folderKey = findFolderKey(dir, target);

    const fileKey = findFileKey(dir, target);
    const personKey = findPersonKey(dir, target);

    let shouldStartDeanOfficeQueue = false;

    if (folderKey) {
      if (folderKey.toLowerCase() === "dziekanat") {
        const department = currentPath[currentPath.length - 1];
        const deanOfficeStatus = getDeanOfficeStatus(department);

        if (deanOfficeStatus.hasHours && !deanOfficeStatus.open) {
          typeLines(deanOfficeStatus.lines, () => {
            showPrompt();
          });
          return;
        }

        if (deanOfficeStatus.hasHours && deanOfficeStatus.open) {
          shouldStartDeanOfficeQueue = true;
        }
      }

      currentPath.push(folderKey);
    } else if (fileKey) {
      typeLines([`'${fileKey}' is a file`, `use: cat ${fileKey}`], () => {
        showPrompt();
      });
      return;
    } else if (personKey) {
      typeLines([`'${personKey}' is a person`, `use: talk ${personKey}`], () => {
        showPrompt();
      });
      return;
    } else {
      typeLines(["folder not found"], () => {
        showPrompt();
      });
      return;
    }

    if (shouldStartDeanOfficeQueue) {
      startDeanOfficeQueue();
      return;
    }

    showPrompt();
  }

  else if (command === "cat") {
    if (!target) {
      typeLines(["usage: cat <file>"], () => {
        showPrompt();
      });
      return;
    }

    const fileKey = findFileKey(dir, target);
    const folderKey = findFolderKey(dir, target);
    const personKey = findPersonKey(dir, target);

    if (fileKey) {
      typeLines(dir[fileKey].split(". ").map((line, index, lines) => {
        return index < lines.length - 1 ? `${line}.` : line;
      }), () => {
        if (fileKey.toLowerCase() === "inzynieria_danych") {
          showInzynieriaDanychVideo();
        } else {
          showPrompt();
        }
      });
      return;
    }

    if (folderKey) {
      typeLines([`'${folderKey}' is a folder`, `use: cd ${folderKey}`], () => {
        showPrompt();
      });
      return;
    }

    if (personKey) {
      typeLines([`'${personKey}' is a person`, `use: talk ${personKey}`], () => {
        showPrompt();
      });
      return;
    }

    typeLines(["file not found"], () => {
      showPrompt();
    });
  }

  else if (command === "talk") {
    if (!target) {
      typeLines(["usage: talk <person>"], () => {
        showPrompt();
      });
      return;
    }

    const personKey = findPersonKey(dir, target);
    const fileKey = findFileKey(dir, target);
    const folderKey = findFolderKey(dir, target);

    if (personKey) {
      startDeanOfficeTalk(dir[personKey]);
      return;
    }

    if (fileKey) {
      typeLines([`'${fileKey}' is a file`, `use: cat ${fileKey}`], () => {
        showPrompt();
      });
      return;
    }

    if (folderKey) {
      typeLines([`'${folderKey}' is a folder`, `use: cd ${folderKey}`], () => {
        showPrompt();
      });
      return;
    }

    typeLines(["person not found"], () => {
      showPrompt();
    });
  }

  else if (command === "pwd") {
    typeLines([printPath()], () => {
      showPrompt();
    });
  }

  else if (command === "help") {
    typeLines([
      "available commands:",
      "ls",
      "cd <folder>",
      "cd ..",
      "cat <file>",
      "talk <person>",
      "pwd"
    ], () => {
      showPrompt();
    });
  }

  else {
    typeLines([
      "command not found",
      "type help"
    ], () => {
      showPrompt();
    });
  }
}
