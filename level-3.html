function normalizeQuery(value) {
  const normalized = value
    .trim()
    .replace(/;$/, "")
    .replace(/\s+/g, " ")
    .toLowerCase();

  return fixCommonTypos(normalized);
}

function fixCommonTypos(query) {
  const phraseFixes = [
    [/\bgrop\s+by\b/g, "group by"],
    [/\bgruop\s+by\b/g, "group by"],
    [/\bgroub\s+by\b/g, "group by"],
    [/\border\s+b?y\b/g, "order by"],
    [/\boder\s+by\b/g, "order by"],
    [/\bordr\s+by\b/g, "order by"]
  ];

  const wordFixes = {
    selec: "select",
    selct: "select",
    slect: "select",
    form: "from",
    fromm: "from",
    wher: "where",
    wheer: "where",
    limt: "limit",
    lmit: "limit",
    avrg: "avg",
    averge: "avg",
    maxx: "max",
    dsc: "desc",
    des: "desc",
    acs: "asc",
    salery_min: "salary_min",
    salry_min: "salary_min",
    salarymin: "salary_min",
    salery_max: "salary_max",
    salry_max: "salary_max",
    salarymax: "salary_max",
    av_salary: "avg_salary",
    avg_salery: "avg_salary",
    avgsalary: "avg_salary"
  };

  let fixed = phraseFixes.reduce((text, [pattern, replacement]) => {
    return text.replace(pattern, replacement);
  }, query);

  fixed = fixed.replace(/\b[a-z_]+\b/g, word => wordFixes[word] || word);

  return fixed;
}

function parseField(field) {
  const computedAvgSalaryMatch = field.match(/^\(\s*(?:salary_min\s*\+\s*salary_max|salary_max\s*\+\s*salary_min)\s*\)\s*\/\s*2(?: as (\w+))?$/);

  if (computedAvgSalaryMatch) {
    return {
      type: "computed_avg_salary",
      source: "salary_range",
      output: computedAvgSalaryMatch[1] || "avg_salary"
    };
  }

  const avgSalaryRangeMatch = field.match(/^avg\(\(\s*salary_min\s*\+\s*salary_max\s*\)\s*\/\s*2\)(?: as (\w+))?$/);

  if (avgSalaryRangeMatch) {
    return {
      type: "avg",
      source: "salary_range",
      output: avgSalaryRangeMatch[1] || "avg_salary"
    };
  }

  const aggregateMatch = field.match(/^(max|avg)\((\w+)\)(?: as (\w+))?$/);

  if (aggregateMatch) {
    const [, type, source, alias] = aggregateMatch;

    return {
      type,
      source,
      output: alias || `${type}_${source}`
    };
  }

  return {
    type: "column",
    source: field,
    output: field
  };
}

function parseSql(value) {
  const sql = normalizeQuery(value);
  const match = sql.match(sqlPattern);

  if (!match) return null;

  const [, rawFields, whereField, operator, rawValue, rawGroupBy, orderBy, direction = "asc", rawLimit] = match;
  const fields = rawFields.split(",").map(field => field.trim());
  const groupBy = rawGroupBy ? rawGroupBy.split(",").map(field => field.trim()) : [];
  const parsedFields = fields.map(parseField);

  const availableColumns = getCurrentColumns();

  if (!fields.includes("*") && parsedFields.some(field => field.type === "column" && !availableColumns.includes(field.source))) return null;
  if (parsedFields.some(field => ["max", "avg"].includes(field.type) && field.source !== "salary_range" && !availableColumns.includes(field.source))) return null;
  if (whereField && !availableColumns.includes(whereField)) return null;
  if (groupBy.some(field => !availableColumns.includes(field))) return null;

  const outputColumns = fields.includes("*")
    ? availableColumns
    : parsedFields.map(field => field.output);

  if (orderBy && !availableColumns.includes(orderBy) && !outputColumns.includes(orderBy)) return null;

  if (groupBy.length && parsedFields.some(field => field.type === "column" && !groupBy.includes(field.source))) return null;

  return {
    fields,
    parsedFields,
    outputColumns,
    where: whereField ? {
      field: whereField,
      operator,
      value: rawValue && rawValue.match(/^max\((\w+)\)$/) ? rawValue.match(/^max\((\w+)\)$/)[1] : (isNaN(rawValue) ? rawValue : Number(rawValue)),
      valueType: rawValue && rawValue.match(/^max\((\w+)\)$/) ? "max" : "literal"
    } : null,
    groupBy,
    orderBy,
    direction,
    limit: rawLimit ? Number(rawLimit) : null
  };
}

function explainParseError(value) {
  const sql = normalizeQuery(value);
  const availableColumns = getCurrentColumns();

  if (!sql) return "> SQL ERROR: wpisz zapytanie.";
  if (!sql.startsWith("select ")) return "> SQL ERROR: zapytanie musi zaczynać się od SELECT.";
  if (!sql.includes(" from ")) return "> SQL ERROR: brakuje FROM jobs.";

  const tableMatch = sql.match(/\bfrom\s+(\w+)/);
  if (tableMatch && tableMatch[1] !== "jobs") return `> SQL ERROR: nie ma tabeli '${tableMatch[1]}'. Użyj FROM jobs.`;
  if (!sql.includes(" from jobs")) return "> SQL ERROR: użyj dokładnie FROM jobs.";
  if (/\bgroup by\s*(?:order by|limit)?$/.test(sql)) return "> SQL ERROR: po GROUP BY podaj kolumny.";
  if (/\border by\s*(?:limit)?$/.test(sql)) return "> SQL ERROR: po ORDER BY podaj kolumnę.";
  if (/\blimit\s+\D/.test(sql)) return "> SQL ERROR: LIMIT musi być liczbą.";

  const match = sql.match(sqlPattern);
  if (!match) {
    return "> SQL ERROR: obsługiwany układ to SELECT ... FROM jobs [WHERE ...] [GROUP BY ...] [ORDER BY ...] [LIMIT n].";
  }

  const [, rawFields, whereField, , , rawGroupBy, orderBy] = match;
  const fields = rawFields.split(",").map(field => field.trim());
  const groupBy = rawGroupBy ? rawGroupBy.split(",").map(field => field.trim()) : [];
  const parsedFields = fields.map(parseField);
  const unknownColumn = parsedFields.find(field => field.type === "column" && field.source !== "*" && !availableColumns.includes(field.source));
  const unknownAggregateColumn = parsedFields.find(field => ["max", "avg"].includes(field.type) && field.source !== "salary_range" && !availableColumns.includes(field.source));
  const unknownGroupColumn = groupBy.find(field => !availableColumns.includes(field));

  if (unknownColumn) return `> SQL ERROR: kolumna '${unknownColumn.source}' nie istnieje. Wpisz help, żeby zobaczyć kolumny.`;
  if (unknownAggregateColumn) return `> SQL ERROR: nie można użyć ${unknownAggregateColumn.type.toUpperCase()} na kolumnie '${unknownAggregateColumn.source}', bo jej nie ma.`;
  if (whereField && !availableColumns.includes(whereField)) return `> SQL ERROR: kolumna '${whereField}' w WHERE nie istnieje.`;
  if (unknownGroupColumn) return `> SQL ERROR: kolumna '${unknownGroupColumn}' w GROUP BY nie istnieje.`;

  const outputColumns = fields.includes("*")
    ? availableColumns
    : parsedFields.map(field => field.output);

  if (orderBy && !availableColumns.includes(orderBy) && !outputColumns.includes(orderBy)) {
    return `> SQL ERROR: kolumna '${orderBy}' w ORDER BY nie istnieje w aktualnym wyniku.`;
  }

  const columnOutsideGroup = groupBy.length && parsedFields.find(field => field.type === "column" && !groupBy.includes(field.source));
  if (columnOutsideGroup) return `> SQL ERROR: kolumna '${columnOutsideGroup.source}' z SELECT musi być też w GROUP BY.`;

  return "> SQL ERROR: nie rozpoznano zapytania.";
}

function explainTaskMismatch(query) {
  if (step === 0) {
    if (query.groupBy.length) return "> TASK ERROR: w TASK 1 nie używaj GROUP BY.";
    if (query.orderBy) return "> TASK ERROR: w TASK 1 nie sortuj wyników.";

    return "> TASK ERROR: utwórz kolumnę z wyrażenia (salary_min+salary_max)/2.";
  }

  if (step === 1) {
    if (!query.groupBy.includes("role")) return "> TASK ERROR: w GROUP BY brakuje kolumny role.";
    if (!query.groupBy.includes("level")) return "> TASK ERROR: w GROUP BY brakuje kolumny level.";
    if (query.orderBy) return "> TASK ERROR: sortowanie zostaw na TASK 3.";
    if (!query.parsedFields.some(field => field.type === "avg" && field.source === activeSalaryColumn)) {
      return `> TASK ERROR: policz AVG(${activeSalaryColumn}).`;
    }
  }

  if (step === 2) {
    if (query.orderBy !== activeSalaryColumn) return `> TASK ERROR: posortuj po kolumnie ${activeSalaryColumn}.`;
    if (query.direction !== "desc") return "> TASK ERROR: użyj sortowania malejącego DESC.";
  }

  if (step === 3) {
    if (!query.fields.includes("role")) return "> TASK ERROR: w SELECT musi być kolumna role.";
    if (query.limit !== 3) return "> TASK ERROR: użyj LIMIT 3.";
  }

  return "> TASK ERROR: zapytanie działa, ale nie rozwiązuje aktualnego zadania.";
}

function runQuery(query) {
  let result = getActiveRows();

  if (query.where) {
    const maxValue = query.where.valueType === "max"
      ? Math.max(...result.map(job => Number(job[query.where.value])))
      : null;

    result = result.filter(job => {
      let fieldValue = job[query.where.field];
      let compareValue = query.where.valueType === "max" ? maxValue : query.where.value;

      if (typeof fieldValue === "string") {
        fieldValue = fieldValue.toLowerCase();
        compareValue = String(compareValue).toLowerCase();
      }

      switch (query.where.operator) {
        case "=": return fieldValue == compareValue;
        case ">": return fieldValue > compareValue;
        case "<": return fieldValue < compareValue;
        case ">=": return fieldValue >= compareValue;
        case "<=": return fieldValue <= compareValue;
        default: return false;
      }
    });
  }

  if (query.groupBy.length) {
    const groups = {};

    result.forEach(job => {
      const key = query.groupBy.map(field => job[field]).join("|");
      if (!groups[key]) groups[key] = [];
      groups[key].push(job);
    });

    result = Object.values(groups).map(rows => {
      const row = {};

      query.groupBy.forEach(field => {
        row[field] = rows[0][field];
      });

      query.parsedFields.forEach(field => {
        if (field.type === "max") {
          row[field.output] = Math.max(...rows.map(item => Number(item[field.source])));
        }

        if (field.type === "avg") {
          const sum = rows.reduce((total, item) => total + getNumericValue(item, field.source), 0);
          row[field.output] = Math.round(sum / rows.length);
        }
      });

      return row;
    });
  }
  else if (query.parsedFields.some(field => ["max", "avg"].includes(field.type))) {
    const row = {};

    query.parsedFields.forEach(field => {
      if (field.type === "max") {
        row[field.output] = Math.max(...result.map(item => Number(item[field.source])));
      }

      if (field.type === "avg") {
        const sum = result.reduce((total, item) => total + getNumericValue(item, field.source), 0);
        row[field.output] = Math.round(sum / result.length);
      }
    });

    result = [row];
  }

  if (query.orderBy) {
    const multiplier = query.direction === "desc" ? -1 : 1;
    result.sort((a, b) => {
      if (a[query.orderBy] > b[query.orderBy]) return multiplier;
      if (a[query.orderBy] < b[query.orderBy]) return -multiplier;
      return 0;
    });
  }

  if (query.limit) {
    result = result.slice(0, query.limit);
  }

  return result;
}

function getNumericValue(row, field) {
  if (field === "salary_range") {
    return (Number(row.salary_min) + Number(row.salary_max)) / 2;
  }

  return Number(row[field]);
}

function getCurrentColumns() {
  return activeColumns;
}

function getActiveRows() {
  return [...activeRows];
}

function buildAverageSalaryRows(salaryColumn) {
  return jobs.map(job => ({
    id: job.id,
    role: job.role,
    level: job.level,
    location: job.location,
    [salaryColumn]: Math.round(getNumericValue(job, "salary_range")),
    tech: job.tech
  }));
}

function getOutputColumn(field) {
  const computedAvgSalaryMatch = field.match(/^\(\s*(?:salary_min\s*\+\s*salary_max|salary_max\s*\+\s*salary_min)\s*\)\s*\/\s*2(?: as (\w+))?$/);
  if (computedAvgSalaryMatch) return computedAvgSalaryMatch[1] || "avg_salary";

  const avgSalaryRangeMatch = field.match(/^avg\(\(\s*salary_min\s*\+\s*salary_max\s*\)\s*\/\s*2\)(?: as (\w+))?$/);
  if (avgSalaryRangeMatch) return avgSalaryRangeMatch[1] || "avg_salary";

  const aggregateMatch = field.match(/^(max|avg)\((\w+)\)(?: as (\w+))?$/);
  if (!aggregateMatch) return field;

  const [, type, source, alias] = aggregateMatch;
  return alias || `${type}_${source}`;
}

function selectFields(rows, fields) {
  const selectedColumns = fields.includes("*")
    ? getCurrentColumns()
    : fields.map(getOutputColumn);

  return rows.map(row => {
    const selected = {};
    selectedColumns.forEach(column => {
      selected[column] = row[column];
    });
    return selected;
  });
}

function formatTable(rows, fields = getCurrentColumns()) {
  const selectedColumns = fields.includes("*")
    ? getCurrentColumns()
    : fields.map(getOutputColumn);

  if (rows.length === 0) {
    return ["> NO ROWS RETURNED"];
  }

  const widths = selectedColumns.map(column => {
    const values = rows.map(row => String(row[column]).length);
    const minWidth = column === "id" ? 3 : column.length;
    return Math.max(minWidth, ...values);
  });

  const header = selectedColumns
    .map((column, index) => column.padEnd(widths[index]))
    .join(" | ");

  const separator = widths
    .map(width => "-".repeat(width))
    .join("-+-");

  const visibleRows = rows.length > tablePreview.head + tablePreview.tail
    ? [
      ...rows.slice(0, tablePreview.head),
      null,
      ...rows.slice(-tablePreview.tail)
    ]
    : rows;

  const dataRows = visibleRows.map(row => {
    if (row === null) {
      return selectedColumns
        .map((column, index) => (index === 0 ? "..." : "").padEnd(widths[index]))
        .join(" | ");
    }

    return selectedColumns
    .map((column, index) => String(row[column]).padEnd(widths[index]))
    .join(" | ");
  });

  return [header, separator, ...dataRows];
}

function showHelp() {
  const helpSteps = [
    {
      syntax: "SELECT <expression> AS <alias> FROM jobs;"
    },
    {
      syntax: "SELECT <columns>, AVG(<column>) AS <alias> FROM jobs GROUP BY <columns>;"
    },
    {
      syntax: "SELECT * FROM jobs ORDER BY <column> DESC;"
    },
    {
      syntax: "SELECT <columns> FROM jobs LIMIT <number>;"
    }
  ];

  const currentHelp = helpSteps[step] || helpSteps[helpSteps.length - 1];
  const hints = [
    () => "avg_salary=(salary_min+salary_max)/2",
    () => `role, level, AVG(${activeSalaryColumn}) AS ${activeSalaryColumn}`
  ];
  const currentHint = hints[step] ? hints[step]() : null;
  const extraHints = taskFailedAttempts[step] >= 3 && currentHint
    ? [
      "",
      "> HINT:",
      currentHint
    ]
    : [];

  typeLines([
    "> SQL HELP:",
    "",
    "> SYNTAX:",
    currentHelp.syntax,
    "",
    "> COLUMNS:",
    getCurrentColumns().join(" | "),
    ...extraHints
  ], () => {
    enableInput(handleInput, "sql> ");
  });
}

function showTask() {
  typeLines([
    getTaskPrompt(),
    "> TYPE 'help' FOR SYNTAX",
    ""
  ], () => {
    enableInput(handleInput, "sql> ");
  });
}

function getTaskPrompt() {
  if (step === 2) {
    return `${tasks[step].prompt} (${activeSalaryColumn})`;
  }

  return tasks[step].prompt;
}

function completeLevel() {
  typeLines([
    "> ACCESS GRANTED",
    "",
    "Inżynieria danych to dziedzina zajmująca się zbieraniem,",
    "porządkowaniem, przetwarzaniem i udostępnianiem danych.",
    "",
    "Obejmuje zawody takie jak Data Engineer, Analytics Engineer,",
    "Database Developer, BI Developer czy Data Architect.",
    "",
    "Specjaliści w tych rolach projektują systemy, które dostarczają dane",
    "do analiz, raportów, aplikacji oraz modeli AI.",
    "",
    "To dobrze opłacany obszar, bo łączy programowanie, bazy danych,",
    "automatyzację i rozumienie biznesu. Firmy potrzebują takich osób,",
    "żeby podejmować decyzje na podstawie wiarygodnych informacji.",
    "",
    "Rosnące znaczenie AI sprawia, że dobre dane stają się jeszcze cenniejsze,",
    "a inżynierowie danych są jednymi z kluczowych specjalistów w tym procesie.",
    "",
    "→ LEVEL 4"
  ], () => {
    goToLevel("level-4.html");
  });
}

function handleInput(value) {
  const input = value.trim();

  if (input.toLowerCase() === "help") {
    showHelp();
    return;
  }

  const query = parseSql(input);

  if (!query) {
    taskFailedAttempts[step]++;
    triggerErrorGlitch();
    typeLines([
      explainParseError(input),
      "> TYPE 'help'"
    ], () => {
      enableInput(handleInput, "sql> ");
    });
    return;
  }

  if (tasks[step].check(query)) {
    taskFailedAttempts[step] = 0;

    if (step === 0) {
      const computedSalaryField = query.parsedFields.find(field => field.type === "computed_avg_salary");
      activeSalaryColumn = computedSalaryField.output;
      activeRows = buildAverageSalaryRows(activeSalaryColumn);
      activeColumns = ["id", "role", "level", "location", activeSalaryColumn, "tech"];
    } else {
      const rows = runQuery(query);
      activeRows = selectFields(rows, query.fields);
      activeColumns = query.fields.includes("*")
        ? getCurrentColumns()
        : query.fields.map(getOutputColumn);

      if (step === 1) {
        const aggregateSalaryField = query.parsedFields.find(field => field.type === "avg" && field.source === activeSalaryColumn);
        activeSalaryColumn = aggregateSalaryField.output;
      }
    }

    triggerSuccess();
    typeLines([
      tasks[step].success,
      "",
      ...formatTable(activeRows, activeColumns),
      ""
    ], () => {
      step++;

      if (step < tasks.length) {
        showTask();
      } else {
        completeLevel();
      }
    });
  } else {
    taskFailedAttempts[step]++;
    const rows = runQuery(query);
    const selectedRows = selectFields(rows, query.fields);
    const output = formatTable(selectedRows, query.fields);

    typeLines([
      "> QUERY EXECUTED",
      "",
      ...output,
      "",
      explainTaskMismatch(query),
      ""
    ], () => {
      showTask();
    });
  }
}

showBootScreen(() => {
  typeLines([
    "> INITIALIZING NODE...",
    "> LEVEL: 3",
    "",
    "> CONNECTING TO JOB MARKET API...",
    "> DOWNLOADING IT JOB OFFERS...",
    "> NORMALIZING SALARY DATA...",
    "> BUILDING TABLE: jobs",
    `> RECORDS LOADED: ${jobs.length}`,
    "",
    ...formatTable(jobs),
    ""
  ], showTask);
});

</script>
