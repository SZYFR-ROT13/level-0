<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEVEL 1</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="terminal"></div>
  <input id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

  <script src="terminal.js"></script>
  <script>
    let step = 0;

    const dataSets = [
      `[
  {
    "vq": 1,
    "vzvr": "Wna",
    "jvrx": 21,
    "zvnfgb": "Xvrypr"
  },
  {
    "vq": 2,
    "vzvr": "Naan",
    "jvrx": 19,
    "zvnfgb": "Xenxbj"
  }
]`,
      `| vq | vzvr  | jvrx | zvnfgb |
|----|-------|------|--------|
| 1  | Wna   | 21   | Xvrypr |
| 2  | Naan  | 19   | Xenxbj |`,
      `fcbfóo betnavmbjnavn v cemrpubjljnavn qnalpu,
xgóel hzbżyvjvn vpu rsrxgljar jlxbemlfgnavr v cemrgjnemnavr.`
    ];

    const questions = [
      "> ANALYZING DATA FORMAT...",
      "> ANALYZING DATA REPRESENTATION...",
      "> DEFINING CONCEPT..."
    ];

    const encodedAnswers = [
      ["anNvbg=="],
      ["dGFibGU=", "dGFiZWxh", "dGFibGljYQ=="],
      [
        "c3RydWt0dXJh",
        "c3RydWt0dXJhIGRhbnljaA==",
        "c3RydWt0dXJ5",
        "c3RydWt0dXJ5IGRhbnljaA==",
        "c3R1Y3R1cmU=",
        "ZGF0YSBzdHJ1Y3R1cmU="
      ]
    ];

    const successMessages = [
      "> DATA FORMAT RECOGNIZED",
      "> DATA REPRESENTATION RECOGNIZED",
      "> CONCEPT RECOGNIZED"
    ];

    function loadStep() {
      const dataLines = dataSets[step]
        .split("\n")
        .map(line => line.replace(/^\s+/g, spaces => "\u00A0".repeat(spaces.length)));

      typeLines([
        questions[step],
        "",
        ...dataLines.map(line => line.replace(/ /g, "\u00A0")),
        ""
      ], () => {
        enableInput(handleInput);
      });
    }

    function handleInput(value) {
      const encoded = btoa(value.toLowerCase().trim());

      if (encodedAnswers[step].includes(encoded)) {

        triggerSuccess();

        typeLines([
          successMessages[step],
          ""
        ], () => {
          step++;

          if (step < dataSets.length) {
            loadStep();
          } else {
            typeLines([
              "> ACCESS GRANTED",
              "",
              "Struktura porządkuje dane i nadaje im znaczenie.",
              "Dzięki niej można je efektywnie wykorzystać.",
              "",
              "→ LEVEL 2"
            ], () => {

              goToLevel("level-2.html");
            });
          }
        });

      } else {
        triggerErrorGlitch();

        typeLines(["> ACCESS DENIED"], () => {
          enableInput(handleInput);
        });
      }
    }

    showBootScreen(() => {
      typeLines([
        "> INITIALIZING NODE...",
        "> LEVEL: 1",
        ""
      ], loadStep);
    });
  </script>

</body>

</html>
